name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp pita.h staging/
          case "${{ matrix.os }}" in
            windows-latest)
              cp target/release/pita.dll staging/
              cp target/release/pita.dll.lib staging/
              cp target/release/pita.lib staging/
              cp target/release/pita-cli.exe staging/
              ;;
            ubuntu-latest)
              cp target/release/libpita.so staging/
              cp target/release/libpita.a staging/
              cp target/release/pita-cli staging/
              ;;
            macos-latest)
              cp target/release/libpita.dylib staging/
              cp target/release/libpita.a staging/
              cp target/release/pita-cli staging/
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pita-${{ matrix.os == 'windows-latest' && 'windows-x64' || matrix.os == 'ubuntu-latest' && 'linux-x64' || 'macos-x64' }}
          path: staging/
          compression-level: 0

  release:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pita-*
          path: artifacts

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install zip -y

      - name: Package
        run: |
          mkdir -p release
          for dir in artifacts/pita-*/; do
            [ -d "$dir" ] || continue
            platform="$(basename "$dir")"
            (cd "$dir" && zip -j "$GITHUB_WORKSPACE/release/${platform}.zip" ./*)
          done
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          tag_name: v0.1.0-${{ github.sha }}
          name: Build ${{ github.sha }}
